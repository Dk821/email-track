<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Tracker Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: { primary: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a' } }
        }
      }
    }
  </script>
  <style>
    @media (prefers-color-scheme: dark) { html { color-scheme: dark; } }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .spinner { border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; width: 20px; height: 20px; animation: spin 0.6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .dark .spinner-dark { border-color: rgba(0,0,0,0.1); border-top-color: #3b82f6; }
    .status-badge { transition: all 0.2s; }
    .card-hover { transition: transform 0.2s, box-shadow 0.2s; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <!-- Header -->
    <header class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-8 gap-4">
      <div>
        <h1 class="text-2xl sm:text-3xl font-bold tracking-tight">Email Tracker</h1>
        <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">Monitor opens and clicks in real time</p>
      </div>
      <div class="flex items-center gap-3">
        <button onclick="toggleDark()" class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 transition" title="Toggle dark mode">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        </button>
        <button onclick="openCompose()" class="flex items-center gap-2 px-4 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700 transition text-sm font-medium">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          Compose
        </button>
        <button id="refreshBtn" onclick="refreshData()" class="flex items-center gap-2 px-4 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700 transition text-sm font-medium">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          Refresh
        </button>
      </div>
    </header>

    <!-- Stats Cards -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
      <div class="bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm border border-gray-200 dark:border-gray-700 card-hover fade-in">
        <div class="flex items-center gap-3 mb-2">
          <div class="p-2 bg-blue-100 dark:bg-blue-900/30 rounded-lg"><svg class="w-5 h-5 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg></div>
          <span class="text-xs font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400">Total</span>
        </div>
        <p id="statTotal" class="text-2xl font-bold">{{ total }}</p>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm border border-gray-200 dark:border-gray-700 card-hover fade-in">
        <div class="flex items-center gap-3 mb-2">
          <div class="p-2 bg-green-100 dark:bg-green-900/30 rounded-lg"><svg class="w-5 h-5 text-green-600 dark:text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
          <span class="text-xs font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400">Opened</span>
        </div>
        <p id="statOpened" class="text-2xl font-bold">{{ opened }}</p>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm border border-gray-200 dark:border-gray-700 card-hover fade-in">
        <div class="flex items-center gap-3 mb-2">
          <div class="p-2 bg-yellow-100 dark:bg-yellow-900/30 rounded-lg"><svg class="w-5 h-5 text-yellow-600 dark:text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg></div>
          <span class="text-xs font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400">Clicked</span>
        </div>
        <p id="statClicked" class="text-2xl font-bold">{{ clicked }}</p>
      </div>
      <div class="bg-white dark:bg-gray-800 rounded-xl p-5 shadow-sm border border-gray-200 dark:border-gray-700 card-hover fade-in">
        <div class="flex items-center gap-3 mb-2">
          <div class="p-2 bg-purple-100 dark:bg-purple-900/30 rounded-lg"><svg class="w-5 h-5 text-purple-600 dark:text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg></div>
          <span class="text-xs font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400">Open Rate</span>
        </div>
        <p id="statRate" class="text-2xl font-bold">{{ rate }}%</p>
      </div>
    </div>

    <!-- Controls -->
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-4 mb-6">
      <div class="flex flex-col sm:flex-row gap-3">
        <div class="flex-1 relative">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input id="searchInput" type="text" placeholder="Search by recipient or subject..." oninput="debounceSearch()" class="w-full pl-10 pr-4 py-2.5 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition" />
        </div>
        <select id="statusFilter" onchange="fetchEmails()" class="px-4 py-2.5 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 outline-none transition">
          <option value="">All Status</option>
          <option value="pending">Pending</option>
          <option value="sent">Sent</option>
          <option value="opened">Opened</option>
          <option value="clicked">Clicked</option>
          <option value="rejected">Rejected</option>
          <option value="bounced">Bounced</option>
          <option value="failed">Failed</option>
        </select>
      </div>
    </div>

    <!-- Table -->
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-gray-50 dark:bg-gray-700/50 text-gray-500 dark:text-gray-400 uppercase text-xs tracking-wider">
              <th class="text-left px-4 py-3 font-semibold">Recipient</th>
              <th class="text-left px-4 py-3 font-semibold">Subject</th>
              <th class="text-left px-4 py-3 font-semibold">Status</th>
              <th class="text-left px-4 py-3 font-semibold whitespace-nowrap">Sent At</th>
              <th class="text-left px-4 py-3 font-semibold whitespace-nowrap">Opened At</th>
              <th class="text-center px-4 py-3 font-semibold">Opens</th>
              <th class="text-center px-4 py-3 font-semibold">Clicks</th>
            </tr>
          </thead>
          <tbody id="emailTableBody" class="divide-y divide-gray-200 dark:divide-gray-700">
            <!-- Loading state -->
            <tr id="loadingRow">
              <td colspan="7" class="px-4 py-12 text-center">
                <div class="flex flex-col items-center gap-3">
                  <div class="spinner spinner-dark dark:border-gray-600 dark:border-t-white"></div>
                  <span class="text-gray-400 text-sm">Loading emails...</span>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- Empty state (hidden by default) -->
      <div id="emptyState" class="hidden flex flex-col items-center py-16 px-4">
        <svg class="w-16 h-16 text-gray-300 dark:text-gray-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        <h3 class="text-lg font-semibold text-gray-500 dark:text-gray-400 mb-1">No emails yet</h3>
        <p class="text-gray-400 text-sm">Send your first email to start tracking opens.</p>
      </div>

      <!-- Pagination -->
      <div id="pagination" class="hidden px-4 py-3 border-t border-gray-200 dark:border-gray-700 flex items-center justify-between">
        <span id="pageInfo" class="text-sm text-gray-500 dark:text-gray-400"></span>
        <div class="flex gap-2">
          <button id="prevBtn" onclick="changePage(-1)" class="px-3 py-1.5 text-sm rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition disabled:opacity-40">Prev</button>
          <button id="nextBtn" onclick="changePage(1)" class="px-3 py-1.5 text-sm rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition disabled:opacity-40">Next</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Live open notifications -->
  <div id="toastContainer" class="fixed top-4 right-4 z-[60] flex flex-col gap-2 w-80"></div>

  <!-- Compose Modal -->
  <div id="composeModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 backdrop-blur-sm">
    <div class="bg-white dark:bg-gray-800 rounded-xl shadow-2xl w-full max-w-lg mx-4 p-6 fade-in">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold">New Email</h2>
        <button onclick="closeCompose()" class="p-1 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <form id="composeForm" onsubmit="sendEmail(event)" class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1">To</label>
          <input type="email" id="composeTo" required placeholder="recipient@example.com" class="w-full px-3 py-2.5 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition" />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Subject</label>
          <input type="text" id="composeSubject" required placeholder="Email subject" class="w-full px-3 py-2.5 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition" />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Body</label>
          <textarea id="composeBody" required rows="5" placeholder="Write your message..." class="w-full px-3 py-2.5 bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg text-sm focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition resize-none"></textarea>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Attachment (optional)</label>
          <input type="file" id="composeAttachment" class="w-full text-sm file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:bg-primary-50 dark:file:bg-primary-900/30 file:text-primary-700 dark:file:text-primary-300 hover:file:bg-primary-100" />
        </div>
        <div id="composeError" class="hidden text-sm text-red-500"></div>
        <div class="flex justify-end gap-3 pt-2">
          <button type="button" onclick="closeCompose()" class="px-4 py-2 text-sm rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition">Cancel</button>
          <button type="submit" id="composeSubmit" class="px-4 py-2 text-sm rounded-lg bg-primary-600 text-white hover:bg-primary-700 transition font-medium flex items-center gap-2">
            <span id="composeBtnText">Send</span>
            <span id="composeSpinner" class="hidden spinner"></span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // --- State ---
    let currentPage = 1;
    let perPage = 20;
    let searchTimeout = null;
    let totalPages = 1;

    // --- Dark Mode ---
    function toggleDark() {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('darkMode', document.documentElement.classList.contains('dark'));
    }
    if (localStorage.getItem('darkMode') === 'false') document.documentElement.classList.remove('dark');

    // --- Formatting ---
    function formatDate(iso) {
      if (!iso) return 'â€”';
      const d = new Date(iso);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function statusBadge(status) {
      const map = { pending: ['bg-gray-100 text-gray-800 dark:bg-gray-700 dark:text-gray-300', 'Pending'], sent: ['bg-yellow-100 text-yellow-800 dark:bg-yellow-900/40 dark:text-yellow-300', 'Sent'], opened: ['bg-green-100 text-green-800 dark:bg-green-900/40 dark:text-green-300', 'Opened (Estimated)'], clicked: ['bg-blue-100 text-blue-800 dark:bg-blue-900/40 dark:text-blue-300', 'Clicked (Engaged)'], rejected: ['bg-orange-100 text-orange-800 dark:bg-orange-900/40 dark:text-orange-300', 'Rejected'], bounced: ['bg-red-100 text-red-800 dark:bg-red-900/40 dark:text-red-300', 'Bounced'], failed: ['bg-red-100 text-red-800 dark:bg-red-900/40 dark:text-red-300', 'Failed'] };
      const [cls, label] = map[status] || ['bg-gray-100 text-gray-800', status];
      return `<span class="status-badge inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${cls}">${label}</span>`;
    }

    // --- API Fetch ---
    async function fetchEmails() {
      const tbody = document.getElementById('emailTableBody');
      const empty = document.getElementById('emptyState');
      const pagination = document.getElementById('pagination');
      const search = document.getElementById('searchInput').value.trim();
      const status = document.getElementById('statusFilter').value;

      tbody.innerHTML = `<tr><td colspan="7" class="px-4 py-12 text-center"><div class="flex flex-col items-center gap-3"><div class="spinner spinner-dark dark:border-gray-600 dark:border-t-white"></div><span class="text-gray-400 text-sm">Loading emails...</span></div></td></tr>`;
      empty.classList.add('hidden');
      pagination.classList.add('hidden');

      try {
        const params = new URLSearchParams({ page: currentPage, per_page: perPage });
        if (search) params.set('search', search);
        if (status) params.set('status', status);
        const res = await fetch(`/api/emails?${params}`);
        const data = await res.json();

        if (data.items.length === 0) {
          tbody.innerHTML = '';
          empty.classList.remove('hidden');
          pagination.classList.add('hidden');
          updateStats(data);
          return;
        }

        totalPages = Math.ceil(data.total / perPage);
        tbody.innerHTML = data.items.map(e => `
          <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50 transition fade-in">
            <td class="px-4 py-3 font-medium">${escapeHtml(e.recipient)}</td>
            <td class="px-4 py-3 max-w-[200px] truncate" title="${escapeHtml(e.subject)}">${escapeHtml(e.subject)}</td>
            <td class="px-4 py-3">
              ${statusBadge(e.status)}
              ${(e.bounce_reason ? `<div class="text-xs text-gray-400 mt-1 truncate max-w-[160px]" title="${escapeHtml(e.bounce_reason)}">${escapeHtml(e.bounce_reason)}</div>` : '')}
            </td>
            <td class="px-4 py-3 whitespace-nowrap text-gray-500 dark:text-gray-400 text-xs">${formatDate(e.sent_at)}</td>
            <td class="px-4 py-3 whitespace-nowrap text-gray-500 dark:text-gray-400 text-xs">${formatDate(e.opened_at)}</td>
            <td class="px-4 py-3 text-center font-semibold">${e.open_count || 0}</td>
            <td class="px-4 py-3 text-center font-semibold">${e.click_count || 0}</td>
          </tr>
        `).join('');

        // Pagination
        document.getElementById('pageInfo').textContent = `Page ${currentPage} of ${totalPages} (${data.total} total)`;
        document.getElementById('prevBtn').disabled = currentPage <= 1;
        document.getElementById('nextBtn').disabled = currentPage >= totalPages;
        pagination.classList.remove('hidden');

        updateStats(data);
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="7" class="px-4 py-8 text-center text-red-500">Failed to load emails. <button onclick="fetchEmails()" class="underline">Retry</button></td></tr>`;
      }
    }

    async function updateStats(data) {
      try {
        const res = await fetch('/api/analytics');
        const stats = await res.json();
        document.getElementById('statTotal').textContent = stats.total;
        document.getElementById('statOpened').textContent = stats.opened;
        document.getElementById('statClicked').textContent = stats.clicked;
        document.getElementById('statRate').textContent = stats.open_rate + '%';
      } catch (_) {}
    }

    function changePage(delta) {
      const next = currentPage + delta;
      if (next < 1 || next > totalPages) return;
      currentPage = next;
      fetchEmails();
    }

    function debounceSearch() {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => { currentPage = 1; fetchEmails(); }, 300);
    }

    function refreshData() {
      const btn = document.getElementById('refreshBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';
      fetchEmails().finally(() => {
        btn.disabled = false;
        btn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg> Refresh';
      });
    }

    // --- Compose ---
    function openCompose() {
      document.getElementById('composeModal').classList.remove('hidden');
      document.getElementById('composeModal').classList.add('flex');
      document.getElementById('composeError').classList.add('hidden');
    }

    function closeCompose() {
      document.getElementById('composeModal').classList.add('hidden');
      document.getElementById('composeModal').classList.remove('flex');
      document.getElementById('composeForm').reset();
    }

    async function sendEmail(e) {
      e.preventDefault();
      const btn = document.getElementById('composeSubmit');
      const btnText = document.getElementById('composeBtnText');
      const spinner = document.getElementById('composeSpinner');
      const error = document.getElementById('composeError');

      btn.disabled = true;
      btnText.textContent = 'Sending...';
      spinner.classList.remove('hidden');
      error.classList.add('hidden');

      try {
        const fileInput = document.getElementById('composeAttachment');
        let attachments = undefined;
        if (fileInput.files && fileInput.files.length > 0) {
          const file = fileInput.files[0];
          const base64 = await fileToBase64(file);
          attachments = [{
            filename: file.name,
            content_base64: base64,
            content_type: file.type || 'application/octet-stream',
          }];
        }

        const res = await fetch('/api/send-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            recipient: document.getElementById('composeTo').value,
            subject: document.getElementById('composeSubject').value,
            body: document.getElementById('composeBody').value,
            attachments,
          }),
        });
        if (!res.ok) {
          const data = await res.json();
          throw new Error(data.detail || 'Failed to send');
        }
        closeCompose();
        fetchEmails();
      } catch (err) {
        error.textContent = err.message;
        error.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btnText.textContent = 'Send';
        spinner.classList.add('hidden');
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // --- Live open notifications (SSE) ---
    function showOpenToast(payload) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = 'fade-in bg-white dark:bg-gray-800 border border-green-200 dark:border-green-800 shadow-lg rounded-lg p-4 flex items-start gap-3';
      toast.innerHTML = `
        <div class="p-2 bg-green-100 dark:bg-green-900/40 rounded-lg shrink-0">
          <svg class="w-5 h-5 text-green-600 dark:text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-semibold">${payload.source === 'click' ? 'Email clicked' : 'Email opened'}</p>
          <p class="text-xs text-gray-500 dark:text-gray-400 truncate">${escapeHtml(payload.recipient)} ${payload.source === 'click' ? 'clicked' : 'opened'} "${escapeHtml(payload.subject)}"</p>
        </div>
        <button class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 shrink-0" onclick="this.closest('div.fade-in').remove()">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      `;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 6000);
    }

    function connectLiveUpdates() {
      const source = new EventSource('/api/events');

      source.addEventListener('email_opened', (e) => {
        const payload = JSON.parse(e.data);
        showOpenToast(payload);
        // Refresh table + stats in place, no full page reload
        fetchEmails();
      });

      source.onerror = () => {
        // Browser auto-reconnects EventSource; nothing else needed.
      };
    }

    // --- Init ---
    document.addEventListener('DOMContentLoaded', () => {
      fetchEmails();
      connectLiveUpdates();
    });
  </script>
</body>
</html>
