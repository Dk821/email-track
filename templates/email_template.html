<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ subject }}</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f4;font-family:Arial,Helvetica,sans-serif;-webkit-font-smoothing:antialiased;">
  <table role="presentation" cellpadding="0" cellspacing="0" style="width:100%;background-color:#f4f4f4;">
    <tr>
      <td align="center" style="padding:40px 10px;">
        <table role="presentation" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">
          {% if logo_url %}
          <tr>
            <td style="padding:0 0 20px;text-align:center;">
              <img src="{{ logo_url }}" alt="{{ company_name }}" style="max-height:50px;border:0;display:inline-block;">
            </td>
          </tr>
          {% endif %}
          <tr>
            <td style="background-color:#2563eb;padding:28px 24px;text-align:center;border-radius:8px 8px 0 0;">
              <h1 style="margin:0;color:#ffffff;font-size:20px;font-weight:700;line-height:1.3;">{{ subject }}</h1>
            </td>
          </tr>
          <tr>
            <td style="background-color:#ffffff;padding:32px 28px;font-size:15px;line-height:1.7;color:#333333;">
              {{ body | safe }}
            </td>
          </tr>
          <tr>
            <td style="background-color:#f9fafb;padding:24px 28px;text-align:center;font-size:12px;color:#999999;border-radius:0 0 8px 8px;">
              <p style="margin:0 0 6px;font-size:13px;color:#666666;">{{ company_name }}</p>
              <p style="margin:0;">&copy; {{ year }} {{ company_name }}. All rights reserved.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
